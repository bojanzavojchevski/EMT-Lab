spring.application.name=accommodation-rental

# Load .env file BEFORE other property sources
spring.config.import=optional:file:.env[.properties]

## PostgreSQL connection
#spring.datasource.url=jdbc:postgresql://localhost:5432/emt_lab1
#spring.datasource.username=postgres
#spring.datasource.password=postgres

# PostgreSQL docker
spring.datasource.url=jdbc:postgresql://localhost:5435/emtlab
spring.datasource.username=emc123
spring.datasource.password=emc123

# JPA settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

jwt.secret=${JWT_SECRET_KEY}
jwt.expiration=864000000
jwt.header=Authorization
jwt.token-prefix=Bearer